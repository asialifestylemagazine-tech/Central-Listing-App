<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASA Marsh — Listing Manager</title>
<style>
/* ═══════════════════════════════════════════════
   THEME — change colours here
═══════════════════════════════════════════════ */
:root {
  --gold:      #C9A96E;
  --gold-bg:   rgba(201,169,110,0.08);
  --bg:        #080808;
  --sb:        #0d0d0d;
  --card:      #141414;
  --border:    #1e1e1e;
  --bh:        #303030;
  --text:      #f0ede8;
  --sub:       #808078;
  --muted:     #454540;
  --inp:       #0b0b0b;
  --danger:    #e05555;
  --dbg:       rgba(224,85,85,0.07);
  --success:   #5eb47a;
}

/* ═══════════════════════════════════════════════
   PASSWORD GATE
═══════════════════════════════════════════════ */
#gate { position:fixed; inset:0; background:#080808; display:flex; align-items:center;
  justify-content:center; z-index:9999; flex-direction:column; }
#gate.hidden { display:none; }
.gate-box { width:300px; text-align:center; }
.gate-logo { font-family:'Georgia',serif; font-size:17px; letter-spacing:.12em; color:#f0ede8; margin-bottom:5px; }
.gate-tag  { font-family:'Helvetica Neue',sans-serif; font-size:9px; letter-spacing:.2em;
  color:#454540; text-transform:uppercase; margin-bottom:38px; }
.gate-box input { width:100%; background:#0b0b0b; border:1px solid #1e1e1e; border-radius:2px;
  padding:11px 14px; color:#f0ede8; font-size:14px; font-family:'Helvetica Neue',sans-serif;
  outline:none; text-align:center; letter-spacing:.08em; margin-bottom:10px; transition:border-color .15s; }
.gate-box input:focus { border-color:#303030; }
.gate-box input.err { border-color:#e05555; animation:gshake .3s ease; }
.gate-btn { width:100%; padding:11px; background:#C9A96E; color:#1a1206; border:none;
  border-radius:2px; font-size:12px; font-weight:500; font-family:'Helvetica Neue',sans-serif;
  letter-spacing:.06em; cursor:pointer; transition:opacity .15s; }
.gate-btn:hover { opacity:.88; }
.gate-err { font-family:'Helvetica Neue',sans-serif; font-size:11px; color:#e05555; margin-top:9px; min-height:16px; }
@keyframes gshake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

/* ═══════════════════════════════════════════════
   BASE
═══════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text);
  font-family: 'Georgia', 'Times New Roman', serif; font-size: 13px; -webkit-font-smoothing: antialiased; }
button { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
input, textarea, select { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
strong { font-weight: 600; }

/* ═══════════════════════════════════════════════
   LAYOUT
═══════════════════════════════════════════════ */
.app  { display: flex; height: 100vh; }
.sb   { width: 215px; flex-shrink: 0; background: var(--sb); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* ═══════════════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════════════ */
.sb-logo { padding: 24px 18px 20px; border-bottom: 1px solid var(--border); }
.sb-logo .name { font-size: 15px; font-weight: normal; letter-spacing: .1em; margin-bottom: 4px; }
.sb-logo .tag  { font-size: 9px; letter-spacing: .2em; color: var(--muted); text-transform: uppercase; font-family: 'Helvetica Neue', sans-serif; }
.sb-nav  { flex: 1; overflow-y: auto; padding: 8px 0; }
.sb-foot { border-top: 1px solid var(--border); padding: 6px 0; }

.nbtn { width: 100%; padding: 9px 18px; background: transparent; border: none;
  border-left: 2px solid transparent; cursor: pointer; text-align: left;
  color: var(--text); transition: background .12s; display: block; }
.nbtn:hover { background: rgba(255,255,255,.025); }
.nbtn.on  { background: var(--gold-bg); border-left-color: var(--gold); }
.nbtn .nl { font-size: 12px; margin-bottom: 2px; font-family: 'Helvetica Neue', sans-serif; transition: color .12s; }
.nbtn.on .nl { color: var(--gold); font-weight: 500; }
.nbtn .nd { font-size: 10px; color: var(--muted); font-family: 'Helvetica Neue', sans-serif; }

/* ═══════════════════════════════════════════════
   MAIN HEADER
═══════════════════════════════════════════════ */
.mhdr { padding: 20px 30px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.mhdr .cmd  { font-size: 10px; letter-spacing: .15em; color: var(--gold); text-transform: uppercase;
  font-weight: 600; margin-bottom: 4px; font-family: 'Helvetica Neue', sans-serif; }
.mhdr .ttl  { font-size: 20px; font-weight: normal; letter-spacing: .02em; margin-bottom: 2px; }
.mhdr .dsc  { font-size: 11px; color: var(--muted); font-family: 'Helvetica Neue', sans-serif; }

/* ═══════════════════════════════════════════════
   FORM AREA
═══════════════════════════════════════════════ */
.fcnt { flex: 1; overflow-y: auto; padding: 26px 30px 80px; }

/* ═══════════════════════════════════════════════
   FORM COMPONENTS
═══════════════════════════════════════════════ */
.sec { margin-bottom: 30px; }
.stitle { font-size: 10px; letter-spacing: .18em; color: var(--gold); text-transform: uppercase;
  font-weight: 600; margin-bottom: 16px; padding-bottom: 9px;
  border-bottom: 1px solid var(--border); font-family: 'Helvetica Neue', sans-serif; }

.fld { margin-bottom: 14px; }
.flbl { font-size: 10px; letter-spacing: .1em; color: var(--sub); text-transform: uppercase;
  font-weight: 500; margin-bottom: 7px; font-family: 'Helvetica Neue', sans-serif; }
.flbl .req { color: var(--gold); margin-left: 2px; }

.g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }

/* Inputs */
input[type=text], input[type=number], input[type=url], textarea, select {
  width: 100%; background: var(--inp); border: 1px solid var(--border); border-radius: 2px;
  padding: 9px 12px; color: var(--text); font-size: 13px; outline: none;
  transition: border-color .15s; }
input:focus, textarea:focus { border-color: var(--bh); }
textarea { resize: vertical; }
::placeholder { color: var(--muted); }
.w160 { max-width: 160px !important; }
.w200 { max-width: 200px !important; }

/* Pills */
.pills { display: flex; flex-wrap: wrap; gap: 6px; }
.pill  { padding: 5px 11px; border-radius: 2px; font-size: 11px; cursor: pointer;
  border: 1px solid var(--border); background: transparent; color: var(--sub);
  transition: all .12s; font-family: 'Helvetica Neue', sans-serif; }
.pill:hover { border-color: var(--bh); color: var(--text); }
.pill.on    { border-color: var(--gold); background: var(--gold-bg); color: var(--gold); }

/* Feature search */
.feat-search { margin-bottom: 16px; }
.feat-search input { max-width: 300px; }
.feat-cat { margin-bottom: 18px; }
.feat-cat-lbl { font-size: 9px; letter-spacing: .14em; color: var(--muted); text-transform: uppercase;
  font-weight: 600; margin-bottom: 8px; font-family: 'Helvetica Neue', sans-serif; }
.pill.hidden { display: none !important; }

/* File zones */
.fzone { border: 1px dashed var(--border); border-radius: 2px; padding: 12px 15px;
  cursor: pointer; background: var(--inp); display: flex; align-items: center; gap: 8px;
  transition: border-color .15s; }
.fzone:hover { border-color: var(--bh); }
.fzone.ok    { border-color: var(--gold); }
.fzone-txt   { font-size: 12px; color: var(--muted); font-family: 'Helvetica Neue', sans-serif; }
.fzone.ok .fzone-txt { color: var(--gold); }

/* Info / warn boxes */
.info { padding: 11px 14px; background: rgba(201,169,110,.06); border: 1px solid rgba(201,169,110,.18);
  border-radius: 2px; margin-bottom: 18px; font-size: 12px; color: var(--sub);
  line-height: 1.65; font-family: 'Helvetica Neue', sans-serif; }
.warn { padding: 11px 14px; background: var(--dbg); border: 1px solid rgba(224,85,85,.2);
  border-radius: 2px; margin-bottom: 18px; font-size: 12px; color: var(--danger);
  line-height: 1.65; font-family: 'Helvetica Neue', sans-serif; }

/* Buttons */
.btn { padding: 9px 22px; border-radius: 2px; font-size: 12px; font-weight: 500;
  cursor: pointer; transition: opacity .15s; border: none; letter-spacing: .04em; }
.btn:disabled { opacity: .5; cursor: wait; }
.btn-gold    { background: var(--gold); color: #1a1206; }
.btn-gold:hover { opacity: .88; }
.btn-danger  { background: var(--dbg); color: var(--danger); border: 1px solid rgba(224,85,85,.25); }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--sub); }
.btn-outline:hover { border-color: var(--bh); color: var(--text); }
.btn-row { display: flex; gap: 10px; align-items: center; margin-top: 8px; margin-bottom: 40px; }

/* Unit cards */
.ucard { border: 1px solid var(--border); border-radius: 3px; padding: 15px; margin-bottom: 10px; background: var(--card); }
.ucard-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.ucard-lbl { font-size: 10px; letter-spacing: .12em; color: var(--gold); text-transform: uppercase;
  font-weight: 600; font-family: 'Helvetica Neue', sans-serif; }
.ucard-rm  { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 18px; line-height: 1; padding: 0; }
.add-unit  { width: 100%; padding: 10px; border: 1px dashed var(--border); background: transparent;
  color: var(--sub); font-size: 12px; cursor: pointer; border-radius: 2px; margin-top: 4px;
  transition: all .12s; }
.add-unit:hover { border-color: var(--gold); color: var(--gold); }

/* Results */
.ritem { border: 1px solid var(--border); border-radius: 2px; padding: 10px 13px;
  margin-bottom: 7px; background: var(--card); display: flex; justify-content: space-between; align-items: center; }
.ritem-ttl  { font-size: 13px; margin-bottom: 2px; }
.ritem-meta { font-size: 11px; color: var(--muted); font-family: 'Helvetica Neue', sans-serif; }
.ritem a    { color: var(--gold); font-size: 11px; text-decoration: none; font-family: 'Helvetica Neue', sans-serif; }

/* Extracted units */
.eu      { border: 1px solid var(--border); border-radius: 2px; padding: 12px; margin-bottom: 8px; background: var(--card); }
.eu-name { font-size: 13px; margin-bottom: 4px; }
.eu-meta { font-size: 11px; color: var(--muted); font-family: 'Helvetica Neue', sans-serif; }
.eu-btns { margin-top: 9px; display: flex; gap: 7px; }
.eu-confirm { padding: 4px 11px; background: var(--gold-bg); border: 1px solid var(--gold); color: var(--gold); border-radius: 2px; font-size: 11px; cursor: pointer; }
.eu-edit    { padding: 4px 11px; background: transparent; border: 1px solid var(--border); color: var(--sub); border-radius: 2px; font-size: 11px; cursor: pointer; }

/* Settings */
.settings-note { padding: 12px 14px; background: var(--card); border: 1px solid var(--border);
  border-radius: 2px; margin-bottom: 22px; font-size: 12px; color: var(--sub);
  line-height: 1.7; font-family: 'Helvetica Neue', sans-serif; }
.settings-hdr { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 22px; }

/* Toast */
#toast { position: fixed; bottom: 20px; right: 20px; padding: 10px 18px; border-radius: 2px;
  font-size: 12px; font-weight: 500; display: none; z-index: 999;
  font-family: 'Helvetica Neue', sans-serif; letter-spacing: .02em; }

/* Wizard steps */
.wiz-progress { display:flex; align-items:center; padding:16px 30px; border-bottom:1px solid var(--border); flex-shrink:0; gap:0; }
.wiz-step { display:flex; align-items:center; gap:7px; }
.wiz-dot { width:22px; height:22px; border-radius:50%; border:1px solid var(--border); background:transparent;
  font-size:10px; font-family:'Helvetica Neue',sans-serif; color:var(--muted); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.wiz-dot.done { background:var(--gold); border-color:var(--gold); color:#1a1206; }
.wiz-dot.active { border-color:var(--gold); color:var(--gold); }
.wiz-label { font-size:10px; font-family:'Helvetica Neue',sans-serif; color:var(--muted); letter-spacing:.06em; white-space:nowrap; }
.wiz-label.active { color:var(--gold); }
.wiz-line { flex:1; height:1px; background:var(--border); margin:0 8px; min-width:8px; }
.wiz-line.done { background:var(--gold); }
.wiz-nav { display:flex; gap:10px; align-items:center; padding-top:24px; padding-bottom:40px; }

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<!-- ── Password Gate ── -->
<div id="gate">

<div id="toast"></div>

<script>

const AGENTS   = [{id:2461,l:'Asa Marsh'}]; // add more agents here

const BATHS    = ['1','2','3','4','5','6','7','8+'];

    {id:99,l:'Mountain view'},{id:98,l:'Partial sea view'},{id:101,l:'Pool view'},{id:97,l:'Sea view'},

  'Location': [
    {id:132,l:'Beachfront'},{id:136,l:'Near Boat Avenue'},{id:134,l:'Near golf course'},

  ],

/* ═══════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════ */
function blankUnit() {
  return { name:'', type:null, status:[], labels:[], beds:null, baths:null, size:'', land:'', price:'', pricePrefix:'' };
}

const S = {
  cmd: 'listproperty',
  settings: false,
  loading: false,
  results: null,
  extracted: null,
  files: {},
  lpStep: 1,
  lpWaiting: false, // true while waiting for post_id from n8n
  webhooks: {
    listing:         '',
    listdevelopment: '',
    updatelisting:   '',
    deletelisting:   '',
    viewlistings:    '',
    drafts:          '',
    uploadmedia:     '',
    scanbrochure:    '',
  },

  lp: { // List Property
    title:'', type:null, status:[], labels:[], areas:[],
    beds:null, baths:null, size:'', land:'', price:'', pricePrefix:'',
    rooms:'', year:'', propertyId:'',

    units: [blankUnit()],

  ul: { postId:'', platforms:[], fields:{ title:'', price:'', status:[], description:'', note:'' } },
  dl: { postId:'', platforms:[] },
  vl: { type:null, status:[], areas:[], beds:null },
  um: { postId:'', mediaType:'gallery', platform:'asamarsh' },
  sb: { platforms:[], note:'', driveLink:'' },
};

/* ═══════════════════════════════════════════════════════
   TEMPLATE HELPERS
═══════════════════════════════════════════════════════ */
const esc = v => String(v||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// Get value from state by dot-path
function gv(fp, fk) {
  const obj = fp.split('.').reduce((o,k) => o&&o[k]!==undefined?o[k]:null, S);
  return obj && obj[fk] !== undefined ? obj[fk] : '';
}

// Set value in state by dot-path
function sv(fp, fk, val) {
  const obj = fp.split('.').reduce((o,k) => o&&o[k]!==undefined?o[k]:null, S);
  if (obj) obj[fk] = val;
}

// Field wrapper
function F(label, content, req=false, style='') {
  return `<div class="fld"${style?` style="${style}"`:''}>
    <div class="flbl">${label}${req?'<span class="req">*</span>':''}</div>
    ${content}
  </div>`;
}

// Section wrapper
function SEC(title, ...items) {
  return `<div class="sec"><div class="stitle">${title}</div>${items.join('')}</div>`;
}

// Grid helpers
function G2(...items) { return `<div class="g2">${items.join('')}</div>`; }
function G3(...items) { return `<div class="g3">${items.join('')}</div>`; }

// Text input
function TXT(fp, fk, placeholder='', cls='') {
  return `<input type="text" data-fp="${fp}" data-fk="${fk}" value="${esc(gv(fp,fk))}" placeholder="${placeholder}"${cls?` class="${cls}"`:''}>`;
}

// Number input
function NUM(fp, fk, placeholder='', cls='') {
  return `<input type="number" data-fp="${fp}" data-fk="${fk}" value="${esc(gv(fp,fk))}" placeholder="${placeholder}"${cls?` class="${cls}"`:''}>`;
}

// URL input
function URL_(fp, fk, placeholder='') {
  return `<input type="url" data-fp="${fp}" data-fk="${fk}" value="${esc(gv(fp,fk))}" placeholder="${placeholder}">`;
}

// Textarea
function TA(fp, fk, rows=4, placeholder='') {
  return `<textarea data-fp="${fp}" data-fk="${fk}" rows="${rows}" placeholder="${placeholder}">${esc(gv(fp,fk))}</textarea>`;
}

// Pills (single or multi select)
function PILLS(fp, fk, opts, multi=false) {
  const obj = fp.split('.').reduce((o,k) => o&&o[k]!==undefined?o[k]:null, S);
  const val = obj ? obj[fk] : (multi?[]:'');
  const isOn = id => multi ? (Array.isArray(val)&&val.includes(id)) : val===id;
  return `<div class="pills" data-fp="${fp}" data-fk="${fk}" data-multi="${multi}">
    ${opts.map(o => `<button class="pill${isOn(o.id)?' on':''}" data-val="${o.id}">${o.l}</button>`).join('')}
  </div>`;
}

// Number pills (beds/baths)
function NPILLS(fp, fk, opts) {
  const obj = fp.split('.').reduce((o,k) => o&&o[k]!==undefined?o[k]:null, S);
  const val = obj ? obj[fk] : null;
  return `<div class="pills" data-fp="${fp}" data-fk="${fk}" data-multi="false">
    ${opts.map(v => `<button class="pill${val===v?' on':''}" data-val="${v}">${v}</button>`).join('')}
  </div>`;
}

// File zone
function FZONE(id, label, multiple=false, accept='*') {
  const files = S.files[id] || [];
  const ok = files.length > 0;
  const txt = ok ? `${files.length} file${files.length>1?'s':''} — ${files.map(f=>f.name).join(', ')}` : `↑  ${label}`;
  return `<div class="fzone${ok?' ok':''}" data-fz="${id}" onclick="trigFile('${id}')">
    <input type="file" id="fi-${id}"${multiple?' multiple':''} accept="${accept}" style="display:none" onchange="onFiles('${id}',this.files)">
    <span class="fzone-txt">${txt}</span>
  </div>`;
}

// Feature section with search
function FEATS(fp, fk) {
  const obj = fp.split('.').reduce((o,k) => o&&o[k]!==undefined?o[k]:null, S);
  const sel = obj ? (obj[fk]||[]) : [];
  let h = `<div class="sec"><div class="stitle">Features</div>
    <div class="feat-search fld">
      <div class="flbl">Search features</div>
      <input type="text" placeholder="Type to filter…" oninput="filterFeats(this.value)" style="max-width:280px">
    </div>
    <div id="feat-cats">`;
  for (const [cat, feats] of Object.entries(FEATURES)) {
    h += `<div class="feat-cat" data-cat="${cat}">
      <div class="feat-cat-lbl">${cat}</div>
      <div class="pills" data-fp="${fp}" data-fk="${fk}" data-multi="true">
        ${feats.map(f => `<button class="pill${sel.includes(f.id)?' on':''}" data-val="${f.id}" data-label="${f.l.toLowerCase()}">${f.l}</button>`).join('')}
      </div></div>`;
  }
  h += `</div></div>`;
  return h;
}

function filterFeats(q) {
  q = q.toLowerCase();
  document.querySelectorAll('#feat-cats .pill').forEach(btn => {
    btn.classList.toggle('hidden', !!q && !btn.dataset.label.includes(q));
  });
  document.querySelectorAll('.feat-cat').forEach(cat => {
    cat.style.display = cat.querySelectorAll('.pill:not(.hidden)').length ? '' : 'none';
  });
}

function wizProgress() {
  const cur = S.lpStep;
  let h = `<div class="wiz-progress">`;
  LP_STEPS.forEach((s,i) => {
    const done=cur>s.n, active=cur===s.n;
    h += `<div class="wiz-step">
      <div class="wiz-dot${done?' done':active?' active':''}">${done?'✓':s.n}</div>
      <div class="wiz-label${active?' active':''}">${s.label}</div>
    </div>`;
    if (i < LP_STEPS.length-1) h += `<div class="wiz-line${done?' done':''}"></div>`;
  });
  return h + `</div>`;
}

function wizNav(nextLabel='Next →', showSubmit=false) {

async function lpNext() {
  if (S.lpStep === 1 && !S.lp.platforms.length) { toast('Select at least one platform', true); return; }
  if (S.lpStep === 2) {
    if (!S.lp.title)         { toast('Property title is required', true); return; }
    if (!S.lp.type)          { toast('Property type is required', true); return; }
    if (!S.lp.status.length) { toast('Status is required', true); return; }
  }
  if (S.lpStep === 5 && !(S.files['lp-feat']||[]).length) { toast('Featured image is required', true); return; }
  if (S.lpStep < 7) { S.lpStep++; render(); document.getElementById('fcnt').scrollTop = 0; }
}

function lpPrev() {
  if (S.lpStep > 1) { S.lpStep--; render(); document.getElementById('fcnt').scrollTop = 0; }
}

    prog.style.display = 'block';
  } else {
    prog.innerHTML = '';
    prog.style.display = 'none';
  }

  // Form content
  document.getElementById('fcnt').innerHTML = S.settings ? renderSettings() : RENDERERS[S.cmd]();
}

function go(cmd) {
  S.cmd = cmd; S.settings = false; S.results = null;
  render();
  document.getElementById('fcnt').scrollTop = 0;
}

function goSettings() { S.settings = true; render(); }

function saveSettings() {
  document.querySelectorAll('[data-wh]').forEach(el => {
    S.webhooks[el.dataset.wh] = el.value.trim();
  });
  localStorage.setItem('am_webhooks', JSON.stringify(S.webhooks));
  toast('Settings saved');
  go(S.cmd);
}

/* ═══════════════════════════════════════════════════════
   EVENT DELEGATION — pills + inputs
═══════════════════════════════════════════════════════ */
document.addEventListener('click', e => {
  const pill = e.target.closest('.pill');
  if (!pill) return;
  const container = pill.closest('.pills');
  if (!container) return;

  // Unit pills (inside listdevelopment)
  if (container.dataset.ui !== undefined) {
    const ui = +container.dataset.ui;
    const uk = container.dataset.uk;
    const multi = container.dataset.multi === 'true';
    const raw = pill.dataset.val;
    const val = isNaN(raw) ? raw : +raw;
    const u = S.ld.units[ui];
    if (!u) return;
    if (multi) {
      const arr = u[uk] || [];
      u[uk] = arr.includes(val) ? arr.filter(x=>x!==val) : [...arr, val];
      pill.classList.toggle('on', u[uk].includes(val));
    } else {
      if (u[uk] === val) {
        u[uk] = null; pill.classList.remove('on');
      } else {
        container.querySelectorAll('.pill.on').forEach(p=>p.classList.remove('on'));
        u[uk] = val; pill.classList.add('on');
      }
    }
    return;
  }

  // Regular form pills
  const fp = container.dataset.fp;
  const fk = container.dataset.fk;
  const multi = container.dataset.multi === 'true';
  if (!fp || !fk) return;

  const obj = fp.split('.').reduce((o,k) => o&&o[k]!==undefined?o[k]:null, S);
  if (!obj) return;

  const raw = pill.dataset.val;
  const val = isNaN(raw) ? raw : +raw;

  if (multi) {
    const arr = obj[fk] || [];
    obj[fk] = arr.includes(val) ? arr.filter(x=>x!==val) : [...arr, val];
    pill.classList.toggle('on', obj[fk].includes(val));
  } else {
    if (obj[fk] === val) {
      obj[fk] = null; pill.classList.remove('on');
    } else {
      container.querySelectorAll('.pill.on').forEach(p=>p.classList.remove('on'));
      obj[fk] = val; pill.classList.add('on');
    }
  }

  // Re-render upload media if mediaType pill changed (to update file zone accept type)
  if (fp === 'um' && fk === 'mediaType') render();
});

document.addEventListener('input', e => {
  const el = e.target;

  // Unit inputs
  if (el.dataset.ui !== undefined && el.dataset.uk) {
    const ui = +el.dataset.ui;
    if (S.ld.units[ui]) S.ld.units[ui][el.dataset.uk] = el.value;
    return;
  }

  // Regular form inputs (skip webhook inputs — handled on save)
  const fp = el.dataset.fp;
  const fk = el.dataset.fk;
  if (!fp || !fk) return;
  const obj = fp.split('.').reduce((o,k) => o&&o[k]!==undefined?o[k]:null, S);
  if (obj) obj[fk] = el.value;
});

/* ═══════════════════════════════════════════════════════
   FILE HANDLING
═══════════════════════════════════════════════════════ */
function trigFile(id) { document.getElementById('fi-' + id).click(); }

function onFiles(id, fileList) {
  S.files[id] = Array.from(fileList);
  const zone = document.querySelector(`.fzone[data-fz="${id}"]`);
  if (!zone) return;
  const f = S.files[id];
  zone.classList.toggle('ok', f.length > 0);
  zone.querySelector('.fzone-txt').textContent = f.length > 0
    ? `${f.length} file${f.length>1?'s':''} — ${f.map(x=>x.name).join(', ')}`
    : `↑  Upload`;
}

function readFilesB64(files) {
  return Promise.all(Array.from(files||[]).map(f => new Promise(res => {
    const r = new FileReader();
    r.onload = () => res({ name: f.name, type: f.type, data: r.result });
    r.readAsDataURL(f);
  })));
}

/* ═══════════════════════════════════════════════════════
   UNIT MANAGEMENT
═══════════════════════════════════════════════════════ */
function addUnit()    { S.ld.units.push(blankUnit()); render(); }
function removeUnit(i){ S.ld.units.splice(i,1); render(); }

/* ═══════════════════════════════════════════════════════
   DRAFT MANAGEMENT
═══════════════════════════════════════════════════════ */
function saveDraft() {
  let drafts = [];
  try { drafts = JSON.parse(localStorage.getItem('am_drafts')||'[]'); } catch(e){}
  const form = S[S.cmd.substring(0,2)] || {};
  drafts.unshift({
    cmd: S.cmd,
    title: form.title || form.devName || `Draft`,
    savedAt: new Date().toLocaleString(),
    data: JSON.parse(JSON.stringify(form)),
  });
  localStorage.setItem('am_drafts', JSON.stringify(drafts.slice(0,20)));
  toast('Draft saved');
}

function loadDraft(i) {
  let drafts = [];
  try { drafts = JSON.parse(localStorage.getItem('am_drafts')||'[]'); } catch(e){}
  if (!drafts[i]) return;
  const d = drafts[i];
  const key = d.cmd.substring(0,2);
  if (S[key]) Object.assign(S[key], d.data);
  go(d.cmd);
}

function deleteDraft(i) {
  let drafts = [];
  try { drafts = JSON.parse(localStorage.getItem('am_drafts')||'[]'); } catch(e){}
  drafts.splice(i, 1);
  localStorage.setItem('am_drafts', JSON.stringify(drafts));
  render();
}

function clearDrafts() {
  if (confirm('Clear all saved drafts?')) {
    localStorage.removeItem('am_drafts');
    render();
  }
}

/* ═══════════════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════════════ */
function toast(msg, err=false) {
  const el = document.getElementById('toast');
  el.textContent = (err ? '✕  ' : '✓  ') + msg;
  el.style.background = err ? 'var(--danger)' : 'var(--success)';
  el.style.color = '#fff';
  el.style.display = 'block';
  clearTimeout(el._t);
  el._t = setTimeout(() => el.style.display = 'none', 3500);
}

/* ═══════════════════════════════════════════════════════
   WEBHOOK POSTING
═══════════════════════════════════════════════════════ */
async function post(cmd, payload) {
  const url = S.webhooks[cmd];
  if (!url) {
    toast(`No webhook set for /${cmd} — go to Settings`, true);
    return false;
  }
  const r = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return true;
}

/* ═══════════════════════════════════════════════════════
   SUBMIT HANDLERS
═══════════════════════════════════════════════════════ */

// Single submission — all text + all images in one FormData POST
async function submitLP() {
  const d = S.lp;
  if (!d.title || !d.type || !d.status.length || !d.platforms.length) {
    toast('Title, type, status and platform are required', true); return;
  }
  const url = S.webhooks['listing'];
  if (!url) { toast('No webhook set — go to Settings', true); return; }

  // Show spinner
  S.lpWaiting = true; render();

  setTimeout(async () => {
    try {
      const form = new FormData();

      // All text fields as JSON
      form.append('data', JSON.stringify(d));

      // Images as binary — no base64, no memory crash
      const feat  = S.files['lp-feat']  || [];
      const gal   = S.files['lp-gal']   || [];
      const plans = S.files['lp-plans'] || [];
      const pdfs  = S.files['lp-pdfs']  || [];

      if (feat[0]) form.append('featuredImage', feat[0]);
      gal.slice(0,10).forEach((f,i)  => form.append(`gallery_${i}`,   f));
      plans.slice(0,5).forEach((f,i) => form.append(`floorPlan_${i}`, f));
      pdfs.slice(0,5).forEach((f,i)  => form.append(`pdf_${i}`,       f));

      const r = await fetch(url, { method:'POST', body: form });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);

      toast('Listing submitted successfully!');

      // Reset
      S.lp = { title:'', type:null, status:[], labels:[], areas:[], beds:null, baths:null,
        size:'', land:'', price:'', pricePrefix:'', rooms:'', year:'', propertyId:'',
        address:'', lat:'', lng:'', description:'', features:[], note:'', agent:2461,
        videoUrl:'', platforms:[], driveLink:'', post_id:null };
      S.files = {};
      S.lpStep = 1;
      S.lpWaiting = false;
      render();

    } catch(e) {
      S.lpWaiting = false; S.lpStep = 7; render();
      toast('Error: ' + e.message, true);
    }
  }, 50);
}

async function submitLD() {
  if (!S.ld.devName || !S.ld.platforms.length) {
    toast('Development name and at least one platform required', true); return;
  }
  try {
    if (await post('listdevelopment', S.ld))
      toast(`Development submitted — ${S.ld.units.length} unit type${S.ld.units.length>1?'s':''}`);
  } catch(e) { toast('Error: ' + e.message, true); }
}

async function submitUL() {
  if (!S.ul.postId) { toast('Post ID required', true); return; }
  try {
    if (await post('updatelisting', S.ul)) toast('Listing updated');
  } catch(e) { toast('Error: ' + e.message, true); }
}

async function submitDL() {
  if (!S.dl.postId || !S.dl.platforms.length) {
    toast('Post ID and at least one platform required', true); return;
  }
  if (!confirm(`Delete listing ${S.dl.postId} from: ${S.dl.platforms.join(', ')}?\nThis cannot be undone.`)) return;
  try {
    if (await post('deletelisting', S.dl)) {
      toast('Listing deleted');
      S.dl = { postId:'', platforms:[] };
      render();
    }
  } catch(e) { toast('Error: ' + e.message, true); }
}

async function fetchListings() {
  S.loading = true; render();
  try {
    let data;
    const url = S.webhooks['viewlistings'];
    if (url) {
      const r = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(S.vl) });
      data = await r.json();
    } else {
      const r = await fetch('https://www.asamarsh.com/wp-json/wp/v2/property?per_page=20&status=publish');
      data = await r.json();
    }
    S.results = data;
  } catch(e) { toast('Error: ' + e.message, true); }
  S.loading = false; render();
}

async function submitUM() {
  if (!S.um.postId || !(S.files['um-files']||[]).length) {
    toast('Post ID and at least one file required', true); return;
  }
  try {
    const payload = { ...S.um, files: await readFilesB64(S.files['um-files']) };
    if (await post('uploadmedia', payload)) {
      toast('Media uploaded');
      S.files['um-files'] = [];
      S.um.postId = '';
      render();
    }
  } catch(e) { toast('Error: ' + e.message, true); }
}

async function submitSB() {
  if (!(S.files['sb-pdf']||[]).length) { toast('Please upload a PDF brochure', true); return; }
  S.loading = true; render();
  try {
    const pdfData = await readFilesB64(S.files['sb-pdf']);
    const payload = { ...S.sb, pdf: pdfData[0] };
    const url = S.webhooks['scanbrochure'];
    if (url) {
      const r = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
      const data = await r.json();
      S.extracted = data.units || [];
    } else {
      S.extracted = [{ name:'Demo unit — connect n8n webhook to enable AI extraction', beds:'3', baths:'3', size:'450', price:'45000000' }];
    }
    toast('Brochure scanned — review extracted units below');
  } catch(e) { toast('Error: ' + e.message, true); }
  S.loading = false; render();
}

/* ═══════════════════════════════════════════════════════
   PASSWORD GATE — change password here
═══════════════════════════════════════════════════════ */
const PASSWORD = 'easylife';

function checkPw() {
  const input = document.getElementById('gate-input');
  const err   = document.getElementById('gate-err');
  if (input.value === PASSWORD) {
    localStorage.setItem('am_auth','1');
    document.getElementById('gate').classList.add('hidden');
    render();
  } else {
    input.classList.add('err');
    err.textContent = 'Incorrect password — try again';
    input.value = '';
    setTimeout(() => input.classList.remove('err'), 400);
  }
}

try {
  const saved = JSON.parse(localStorage.getItem('am_webhooks')||'{}');

if (localStorage.getItem('am_auth') === '1') {
